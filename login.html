<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access | WAHEGURU AURA OPTIX</title>
    <script>
      if (localStorage.getItem('opticaura_logged_in')) {
        window.location.href = 'wp-copy/site.html';
      }
    </script>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo {
        width: 100%;        
        max-width: 220px;   
        height: auto;       
        margin-bottom: 20px;
        }

        .toggle-box {
            display: flex;
            background-color: #f6f1e7; 
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #444;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background-color: #8c7a5b; 
            color: #ffffff;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #444;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            border-color: #8c7a5b;
        }

        .forgot-link-wrapper {
            text-align: right;
            margin-top: -5px;
        }

        .form-link {
            font-size: 13px;
            color: #8c7a5b;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .form-link:hover {
            text-decoration: underline;
            color: #73644a;
        }

        .submit-btn {
            background-color: #8c7a5b;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #73644a;
        }

        .error-message {
            color: #cc0000;
            font-size: 14px;
            margin-top: -5px;
            text-align: left;
            display: none;
        }

        .form-instruction {
            font-size: 14px;
            color: #666;
            text-align: left;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        @media screen and (max-width: 480px) {
    body {
        padding: 10px; 
    }

    .form-container {
        padding: 30px 20px; 
    }

    .logo {
        max-width: 170px; 
        margin-bottom: 15px;
    }

    .toggle-box {
        margin-bottom: 20px; 
    }

    .toggle-btn {
        font-size: 15px; 
        padding: 8px;
    }
}
    </style>
</head>
<body>

    
    <div class="form-container">
        <img src="wp-copy/logo.png" alt="WAHEGURU AURA OPTIX" class="logo">

        <div class="toggle-box" id="toggleTabs">
            <button class="toggle-btn active" id="signupToggle" onclick="switchForm('signup')">Sign Up</button>
            <button class="toggle-btn" id="loginToggle" onclick="switchForm('login')">Login</button>
        </div>

        <form id="signupForm" class="auth-form active" onsubmit="handleSignUp(event)">
            <div class="input-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="Create your email" required>
            </div>
            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password (min. 6 characters)" required>
            </div>
            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
            </div>
            <div id="signupError" class="error-message"></div>
            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <div id="loginError" class="error-message"></div>
            <div class="forgot-link-wrapper">
                <span class="form-link" onclick="switchForm('forgot')">Forgot Password?</span>
            </div>
            <button type="submit" class="submit-btn">Welcome Back</button>
        </form>

        <form id="forgotForm" class="auth-form" onsubmit="handleForgotPassword(event)">
            <p class="form-instruction">Enter your email address below and we'll send you a link to reset your password.</p>
            <div class="input-group">
                <label for="forgotEmail">Email Address</label>
                <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="submit-btn">Send Reset Link</button>
            <div style="margin-top: 10px;">
                <span class="form-link" onclick="switchForm('login')">← Back to Login</span>
            </div>
        </form>
    </div>

    <script>
        function switchForm(formType) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const forgotForm = document.getElementById('forgotForm');
            
            const loginToggle = document.getElementById('loginToggle');
            const signupToggle = document.getElementById('signupToggle');
            const toggleTabs = document.getElementById('toggleTabs');




            document.getElementById('signupError').style.display = "none";
            document.getElementById('loginError').style.display = "none";

            loginForm.classList.remove('active');
            signupForm.classList.remove('active');
            forgotForm.classList.remove('active');
            
            toggleTabs.style.display = "flex";

            if (formType === 'login') {
                loginForm.classList.add('active');
                loginToggle.classList.add('active');
                signupToggle.classList.remove('active');
            } else if (formType === 'signup') {
                signupForm.classList.add('active');
                signupToggle.classList.add('active');
                loginToggle.classList.remove('active');
            } else if (formType === 'forgot') {
                forgotForm.classList.add('active');
                toggleTabs.style.display = "none";
            }
        }




        function handleSignUp(event) {
            event.preventDefault(); 

            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('signupError');

            if (password !== confirmPassword) {
                errorDiv.innerText = "Passwords do not match!";
                errorDiv.style.display = "block";
                return;
            } 
            
            if (password.length < 6) {
                errorDiv.innerText = "Password should be at least 6 characters long.";
                errorDiv.style.display = "block";
                return;
            }





            localStorage.setItem('registeredEmail', email);
            localStorage.setItem('registeredPassword', password);

            errorDiv.style.display = "none";
            alert("Account created successfully! Please log in now with your details.");
            
            switchForm('login');
        }




        function handleLogin(event) {
            event.preventDefault(); 

            const inputEmail = document.getElementById('loginEmail').value.trim();
            const inputPassword = document.getElementById('loginPassword').value;
            const loginError = document.getElementById('loginError');


            const savedEmail = localStorage.getItem('registeredEmail');
            const savedPassword = localStorage.getItem('registeredPassword');


            if (!savedEmail) {
                loginError.innerText = "No account found! Please sign up first.";
                loginError.style.display = "block";
                return;
            }


            // Match details
            if (inputEmail === savedEmail && inputPassword === savedPassword) {
                loginError.style.display = "none";
                alert("Login successful! Redirecting to your dashboard...");
                localStorage.setItem('opticaura_logged_in', 'true');
                window.location.href = "wp-copy/site.html"; 
            } else {
                loginError.innerText = "Invalid email or password.";
                loginError.style.display = "block";
            }
        }



        // Handle Forgot Pass Subm
        function handleForgotPassword(event) {
            event.preventDefault();
            const inputEmail = document.getElementById('forgotEmail').value.trim();
            const savedEmail = localStorage.getItem('registeredEmail');
            
            if (inputEmail === savedEmail) {
                alert("A password reset link has been sent to your email!");
            } else {
                alert("If this email matches our records, a reset link will be sent shortly.");
            }
            
            document.getElementById('forgotEmail').value = "";
            switchForm('login');
        }
    </script>
</body>
</html>
